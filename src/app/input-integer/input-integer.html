<div class="input-group input-group-sm">
  <button class="btn btn-outline-danger" (click)="decrementarCantidad()">-</button>

  <input
    type="text"
    class="form-control text-center"
    [(ngModel)]="quantity"
    (keyup)="onChangeQuantity($event)"
  />

  <button class="btn btn-outline-success" (click)="incrementarCantidad()">+</button>
</div>
